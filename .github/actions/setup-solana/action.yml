name: "Setup Solana (agave)"
description: >
  Install the Solana CLI (SOLANA_VERSION) via the official release.anza.xyz
  installer, plus a throwaway default identity. We use the official installer
  (not a raw tarball) so `agave-install` is registered: avm auto-resolves the
  matching Solana for the Anchor toolchain and manages it through agave-install,
  so the version installed here must equal what avm resolves (1.18.26 — the max
  satisfying the program's `^1.16` solana-program dep) to avoid an activation
  clash. Anchor 0.28 builds fine under Solana 1.18.
runs:
  using: "composite"
  steps:
    - name: Cache Solana CLI
      id: cache-solana
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: |
          ~/.local/share/solana/
        key: solana-${{ runner.os }}-${{ env.SOLANA_VERSION }}

    - name: Install Solana + default identity
      shell: bash
      run: |
        set -euo pipefail
        BIN="$HOME/.local/share/solana/install/active_release/bin"
        if [ ! -x "$BIN/solana" ]; then
          echo "Installing Solana v${SOLANA_VERSION} via release.anza.xyz…"
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
        else
          echo "Using cached Solana at $BIN"
        fi
        echo "$BIN" >> "$GITHUB_PATH"
        export PATH="$BIN:$PATH"
        solana --version
        # Throwaway CLI identity so commands that read the default keypair don't
        # fail on a fresh runner. Generated fresh (never a hardcoded array, which
        # would be printed into the workflow log). Real signing in every flow
        # uses an explicit --keypair / --provider.wallet (the deployer secret).
        mkdir -p "$HOME/.config/solana"
        solana-keygen new --no-bip39-passphrase --silent --force -o "$HOME/.config/solana/id.json"
