name: "Setup Solana (1.16.x)"
description: >
  Install a pinned Solana CLI and a throwaway default identity, caching across
  runs. Anchor 0.28 pairs with Solana 1.16.x (solana-labs) — NOT the
  anza-xyz/agave releases (those start at 1.18). Binaries are pulled directly
  from the GitHub release asset; the env var SOLANA_VERSION selects the version.
runs:
  using: "composite"
  steps:
    - name: Cache Solana CLI
      id: cache-solana
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: |
          ~/.local/share/solana-${{ env.SOLANA_VERSION }}/
        key: solana-${{ runner.os }}-${{ env.SOLANA_VERSION }}

    - name: Install Solana + default identity
      shell: bash
      run: |
        set -euo pipefail
        DIR="$HOME/.local/share/solana-${SOLANA_VERSION}"
        BIN="$DIR/bin"
        if [ ! -x "$BIN/solana" ]; then
          # Pull the prebuilt release tarball straight from GitHub. The legacy
          # release.solana.com install redirect is dead post-Anza, and
          # release.anza.xyz doesn't carry pre-1.18 builds — the GitHub release
          # asset is the reliable source for 1.16.x.
          echo "Downloading Solana v${SOLANA_VERSION} from GitHub releases…"
          mkdir -p "$DIR"
          url="https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          curl -sSfL "$url" | tar -xj -C "$DIR" --strip-components=1
        else
          echo "Using cached Solana at $BIN"
        fi
        echo "$BIN" >> "$GITHUB_PATH"
        export PATH="$BIN:$PATH"
        solana --version
        # Throwaway CLI identity so commands that read the default keypair don't
        # fail on a fresh runner. Generated fresh (never a hardcoded array, which
        # would be printed into the workflow log). Real signing in every flow
        # uses an explicit --keypair / --provider.wallet (the deployer secret).
        mkdir -p "$HOME/.config/solana"
        solana-keygen new --no-bip39-passphrase --silent --force -o "$HOME/.config/solana/id.json"
