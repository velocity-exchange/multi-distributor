name: "Setup Anchor CLI (0.28)"
description: >
  Install the Anchor CLI pinned by ANCHOR_VERSION (0.28.0) directly from source
  and cache the binary. We deliberately do NOT use `avm`: recent avm auto-resolves
  and installs a Solana version via `agave-install` (it picked 1.18.26 from the
  solana-program dep), which clashes with the manually-installed 1.16.16 and
  fails the run. A direct `cargo install` of anchor-cli has no such behavior.
  Built with `+stable` since the repo's rust-toolchain.toml (1.70) is too old to
  compile the CLI's host deps.
runs:
  using: "composite"
  steps:
    - name: Cache Anchor CLI
      id: cache-anchor
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cargo/bin/anchor
        key: ${{ runner.os }}-anchor-cli-${{ env.ANCHOR_VERSION }}

    - name: Install Anchor CLI
      shell: bash
      run: |
        set -euo pipefail
        rustup toolchain install stable --profile minimal --no-self-update
        if ! command -v anchor >/dev/null 2>&1; then
          sudo apt-get update -y
          sudo apt-get install -y libudev-dev pkg-config build-essential
          # `+stable` overrides the repo's rust-toolchain.toml (1.70) for this build.
          cargo +stable install --git https://github.com/coral-xyz/anchor \
            --tag "v${ANCHOR_VERSION}" anchor-cli --locked --force
        fi
        anchor --version
