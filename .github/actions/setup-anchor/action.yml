name: "Setup Anchor CLI (0.28)"
description: >
  Install the Anchor CLI pinned by ANCHOR_VERSION (0.28.0) via avm and cache it.
  We use avm rather than `cargo install anchor-cli` because anchor 0.28 cannot be
  built fresh on a modern runner (its Cargo.lock pins wasm-bindgen 0.2.86 which
  new Rust rejects, and unlocked it needs the fully-yanked cargo_toml ^0.13); avm
  builds the otter-sec 0.28 fork against a self-consistent lockfile that compiles.
  avm auto-installs the matching Solana via agave-install — setup-solana must run
  first and install that exact version so there's no activation clash. avm itself
  is built with `+stable` (the repo's 1.70 is too old for it).
runs:
  using: "composite"
  steps:
    - name: Cache Anchor CLI (avm)
      id: cache-anchor
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.avm
        key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}

    - name: Install Anchor CLI
      shell: bash
      run: |
        set -euo pipefail
        rustup toolchain install stable --profile minimal --no-self-update
        if ! command -v avm >/dev/null 2>&1; then
          sudo apt-get update -y
          sudo apt-get install -y libudev-dev pkg-config build-essential
          # `+stable` overrides the repo's rust-toolchain.toml (1.70) for this build.
          cargo +stable install --git https://github.com/coral-xyz/anchor avm --locked --force
        fi
        avm install "${ANCHOR_VERSION}"
        avm use "${ANCHOR_VERSION}"
        anchor --version
