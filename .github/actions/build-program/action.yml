name: "Build Program (verifiable .so + IDL)"
description: >
  Produces the deployable, verifiable `merkle_distributor.so` (solana-verify) and
  the Anchor IDL JSON. Anchor 0.28 has no `anchor idl build` (that landed in
  0.29), so the IDL is generated by `anchor build`, which uses the parse method.
  Both are uploaded as artifacts for the audit trail; later steps in the same job
  read them straight from target/.
inputs:
  program:
    description: "Program crate name / library name"
    required: false
    default: merkle_distributor
runs:
  using: "composite"
  steps:
    - name: Install Rust toolchains
      shell: bash
      run: |
        set -euo pipefail
        # stable: for host tooling (avm, solana-verify). 1.70: the program's own
        # toolchain — rust-toolchain.toml in the repo root pins it automatically
        # for `anchor build`, but install it explicitly so it's present + cached.
        rustup toolchain install stable --profile minimal --no-self-update
        rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal --no-self-update

    - name: Cache cargo
      uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2
      with:
        cache-on-failure: "true"

    - uses: ./.github/actions/setup-solana/
    - uses: ./.github/actions/setup-anchor/

    - name: Cache solana-verify
      id: cache-solana-verify
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cargo/bin/solana-verify
        key: ${{ runner.os }}-solana-verify-v0.4.6

    - name: Install solana-verify
      if: steps.cache-solana-verify.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update -y && sudo apt-get install -y libudev-dev
        # `+stable`: solana-verify needs a newer compiler than the program's 1.70.
        # The deployable .so is built inside the pinned VERIFIABLE_BUILD_IMAGE, so
        # the solana-verify *CLI* version only affects hashing, not the build hash.
        cargo +stable install solana-verify --version 0.4.6 --locked

    - name: Anchor build (generates IDL — Anchor 0.28 parse method)
      shell: bash
      env:
        PROGRAM: ${{ inputs.program }}
      run: |
        set -euo pipefail
        # Uses the repo's rust-toolchain.toml (1.70) automatically.
        anchor build
        ls -l "target/idl/${PROGRAM}.json"

    - name: Verifiable build (produces deployable .so)
      shell: bash
      env:
        PROGRAM: ${{ inputs.program }}
      run: |
        set -euo pipefail
        # NOTE: VERIFIABLE_BUILD_IMAGE must be a tag that exists on Docker Hub and
        # matches SOLANA_VERSION (1.16.x). Confirm the tag at
        # https://hub.docker.com/r/solanafoundation/solana-verifiable-build/tags
        # before first use; drop `-b "$VERIFIABLE_BUILD_IMAGE"` to let solana-verify
        # auto-select the image for the detected solana version.
        solana-verify build --library-name "$PROGRAM" -b "$VERIFIABLE_BUILD_IMAGE"
        ls -l target/deploy/

    - name: Upload .so artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ inputs.program }}-so
        path: target/deploy/${{ inputs.program }}.so

    - name: Upload IDL artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ inputs.program }}-idl
        path: target/idl/${{ inputs.program }}.json
