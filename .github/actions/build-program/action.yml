name: "Build Program (solana-verify + IDL)"
description: >
  Builds `merkle_distributor.so` with `solana-verify build` — the SAME tool +
  image (solanafoundation/solana-verifiable-build, Solana 1.18.26 resolved from
  the solana-program dep) that `solana-verify verify-from-repo` and explorers use.
  This is what makes the deployed program verifiable: its on-chain hash will match
  what verify-from-repo recomputes. (`anchor build --verifiable` uses a different
  image and would NOT verify.) Output .so lands in target/deploy/; the IDL is
  parsed from source (solana-verify doesn't emit an Anchor IDL).
inputs:
  program:
    description: "Program crate / library name"
    required: false
    default: merkle_distributor
runs:
  using: "composite"
  steps:
    - name: Install stable Rust (for host tooling)
      shell: bash
      run: rustup toolchain install stable --profile minimal --no-self-update

    - uses: ./.github/actions/setup-solana/
    - uses: ./.github/actions/setup-anchor/

    - name: Cache solana-verify
      id: cache-solana-verify
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cargo/bin/solana-verify
        key: ${{ runner.os }}-solana-verify-v0.4.6

    - name: Install solana-verify
      if: steps.cache-solana-verify.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update -y && sudo apt-get install -y libudev-dev
        cargo +stable install solana-verify --version 0.4.6 --locked

    - name: Verifiable build (.so) + IDL
      shell: bash
      env:
        PROGRAM: ${{ inputs.program }}
      run: |
        set -euo pipefail
        # Builds in solanafoundation/solana-verifiable-build:<resolved-solana>.
        # Solana is already installed via the official agave installer at the same
        # version solana-verify resolves, so there's no agave-install clash.
        # Writes target/deploy/<program>.so.
        solana-verify build --library-name "$PROGRAM"
        # solana-verify only builds the .so; generate the Anchor IDL from source
        # (the parse method Anchor 0.28 itself uses — there's no `anchor idl build`).
        anchor idl parse --file "programs/merkle-distributor/src/lib.rs" \
          --out "target/idl/${PROGRAM}.json"
        ls -l "target/deploy/${PROGRAM}.so" "target/idl/${PROGRAM}.json"

    - name: Upload .so artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ inputs.program }}-so
        path: target/deploy/${{ inputs.program }}.so

    - name: Upload IDL artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ inputs.program }}-idl
        path: target/idl/${{ inputs.program }}.json
