name: "Build Program (.so + IDL)"
description: >
  Produces the deployable `merkle_distributor.so` and the Anchor IDL JSON with a
  plain `anchor build` (Anchor 0.28 generates the IDL by the parse method — there
  is no `anchor idl build` until 0.29). The .so lands in target/deploy/ and the
  IDL in target/idl/; both are uploaded as artifacts and read by later steps in
  the same job.

  NOTE: this is a standard (non-reproducible) anchor build. We dropped the
  solana-verify verifiable build because solana-verify, like avm, auto-resolves a
  Solana version via `agave-install` and conflicts with the pinned 1.16.16. If
  reproducible builds are needed later, add `anchor build --verifiable` (image
  backpackapp/build:v0.28.0), which runs entirely in Docker and sidesteps that.
inputs:
  program:
    description: "Program crate name / library name"
    required: false
    default: merkle_distributor
runs:
  using: "composite"
  steps:
    - name: Install Rust toolchains
      shell: bash
      run: |
        set -euo pipefail
        # stable: for host tooling (anchor-cli). 1.70: the program's own toolchain —
        # rust-toolchain.toml pins it automatically for `anchor build`, but install
        # it explicitly so it's present + cached.
        rustup toolchain install stable --profile minimal --no-self-update
        rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal --no-self-update

    - name: Cache cargo
      uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2
      with:
        cache-on-failure: "true"

    - uses: ./.github/actions/setup-solana/
    - uses: ./.github/actions/setup-anchor/

    - name: Anchor build (.so + IDL, Anchor 0.28)
      shell: bash
      env:
        PROGRAM: ${{ inputs.program }}
      run: |
        set -euo pipefail
        # cargo-build-sbf (from the pinned Solana) compiles the SBF; the host
        # rust-toolchain.toml (1.70) handles proc-macros + IDL parsing.
        anchor build
        ls -l "target/deploy/${PROGRAM}.so" "target/idl/${PROGRAM}.json"

    - name: Upload .so artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ inputs.program }}-so
        path: target/deploy/${{ inputs.program }}.so

    - name: Upload IDL artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ inputs.program }}-idl
        path: target/idl/${{ inputs.program }}.json
