name: "Build Program (verifiable .so + IDL)"
description: >
  Produces a REPRODUCIBLE `merkle_distributor.so` via `anchor build --verifiable`,
  which builds inside the Anchor 0.28 Docker image (backpackapp/build:v0.28.0,
  Solana 1.16.x baked in) and writes target/verifiable/<program>.so. Building in
  the image makes the hash match `solana-verify`/explorer and sidesteps the host
  avm/agave/solana-version conflicts entirely. The IDL goes to target/idl/.
  solana-verify is installed only for HASHING (get-executable-hash /
  get-buffer-hash) — never `solana-verify build`, which would re-trigger the
  agave Solana resolution.
inputs:
  program:
    description: "Program crate name / library name"
    required: false
    default: merkle_distributor
runs:
  using: "composite"
  steps:
    - name: Install stable Rust (for host tooling)
      shell: bash
      run: rustup toolchain install stable --profile minimal --no-self-update

    - uses: ./.github/actions/setup-solana/
    - uses: ./.github/actions/setup-anchor/

    - name: Cache solana-verify
      id: cache-solana-verify
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cargo/bin/solana-verify
        key: ${{ runner.os }}-solana-verify-v0.4.6

    - name: Install solana-verify (hashing only)
      if: steps.cache-solana-verify.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update -y && sudo apt-get install -y libudev-dev
        # `+stable` (the program's 1.70 is too old). Used ONLY for get-executable-hash
        # / get-buffer-hash; we never run `solana-verify build`.
        cargo +stable install solana-verify --version 0.4.6 --locked

    - name: Verifiable build (.so) + IDL
      shell: bash
      env:
        PROGRAM: ${{ inputs.program }}
      run: |
        set -euo pipefail
        # Reproducible build inside the pinned Anchor 0.28 image. Pass the image
        # explicitly: anchor 0.28 defaults to projectserum/build:v0.28.0, which no
        # longer exists on Docker Hub (migrated to backpackapp). Writes
        # target/verifiable/<program>.so.
        anchor build --verifiable --docker-image backpackapp/build:v0.28.0
        # The verifiable build also emits the IDL; parse from source as a fallback.
        if [ ! -f "target/idl/${PROGRAM}.json" ]; then
          echo "IDL not produced by verifiable build; parsing from source…"
          anchor idl parse --file "programs/merkle-distributor/src/lib.rs" \
            --out "target/idl/${PROGRAM}.json"
        fi
        ls -l "target/verifiable/${PROGRAM}.so" "target/idl/${PROGRAM}.json"

    - name: Upload .so artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ inputs.program }}-so
        path: target/verifiable/${{ inputs.program }}.so

    - name: Upload IDL artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ inputs.program }}-idl
        path: target/idl/${{ inputs.program }}.json
