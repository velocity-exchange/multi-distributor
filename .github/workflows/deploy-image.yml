name: Build & push DFX distributor API image

on:
  push:
    branches: [main]          # devnet/non-prod
    tags: ['v*']              # tagged release → mainnet-beta
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [non-prod, prod]
        default: non-prod

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target env
        id: env
        env:
          INPUT_ENV: ${{ inputs.environment }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            echo "name=prod" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "$INPUT_ENV" in
              prod|non-prod) echo "name=$INPUT_ENV" >> "$GITHUB_OUTPUT" ;;
              *) echo "Unknown environment: $INPUT_ENV" >&2; exit 1 ;;
            esac
          else
            echo "name=non-prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Set registry + tag suffix
        id: reg
        env:
          TARGET_ENV: ${{ steps.env.outputs.name }}
        run: |
          if [ "$TARGET_ENV" = "prod" ]; then
            echo "registry=875427118836.dkr.ecr.eu-west-1.amazonaws.com" >> "$GITHUB_OUTPUT"
            echo "role=${{ vars.ECR_PUSH_ROLE_PROD }}" >> "$GITHUB_OUTPUT"
            echo "suffix=latest-mainnet-beta" >> "$GITHUB_OUTPUT"
            echo "dispatch_event=dfx-distributor-prod" >> "$GITHUB_OUTPUT"
          else
            echo "registry=011528263343.dkr.ecr.eu-west-1.amazonaws.com" >> "$GITHUB_OUTPUT"
            echo "role=${{ vars.ECR_PUSH_ROLE_NONPROD }}" >> "$GITHUB_OUTPUT"
            echo "suffix=latest-master" >> "$GITHUB_OUTPUT"
            echo "dispatch_event=dfx-distributor-nonprod" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.reg.outputs.role }}
          role-session-name: gha-${{ github.run_id }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          REGISTRY: ${{ steps.reg.outputs.registry }}
          SUFFIX: ${{ steps.reg.outputs.suffix }}
          SHA: ${{ github.sha }}
        run: |
          docker build --target drift-dfx-distributor-api \
            -t "$REGISTRY/dfx-distributor-api:$SHA" \
            -t "$REGISTRY/dfx-distributor-api:$SUFFIX" \
            -f Dockerfile .
          docker push "$REGISTRY/dfx-distributor-api:$SHA"
          docker push "$REGISTRY/dfx-distributor-api:$SUFFIX"

      - name: Trigger infra-v3 rollout
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_V3_DISPATCH_TOKEN }}   # PAT/app token with repo:write on infrastructure-v3
          repository: drift-labs/infrastructure-v3
          event-type: ${{ steps.reg.outputs.dispatch_event }}
          client-payload: '{"sha": "${{ github.sha }}"}'
