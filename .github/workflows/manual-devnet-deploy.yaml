name: Manual Devnet Program Deploy

# Devnet deploys are manual-only — pick the source branch/ref from the Actions
# tab. The workflow proposes a Squads upgrade on the devnet multisig; a signer
# still has to approve + execute it. Use this to rehearse before tagging a
# mainnet release.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch (or ref) to build from"
        required: true
        default: main
        type: string

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: "1.70.0"
  # Solana the Anchor 0.28 toolchain resolves (max satisfying solana-program ^1.16);
  # avm installs it via agave-install, so setup-solana installs the same version.
  SOLANA_VERSION: "1.18.26"
  ANCHOR_VERSION: "0.28.0"
  DISTRIBUTOR_PROGRAM_ID: distAitdwx9mDm3SaPMtGZRjpXMPUenLhmPwoySV3Hp

jobs:
  deploy:
    name: Build + propose devnet upgrade
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.branch }}

      - name: Build (verifiable .so + IDL)
        uses: ./.github/actions/build-program/
        with:
          program: merkle_distributor

      - name: Buffer deploy (devnet)
        id: buffer-deploy
        uses: ./.github/actions/buffer-deploy/
        with:
          program: merkle_distributor
          program-id: ${{ env.DISTRIBUTOR_PROGRAM_ID }}
          rpc-url: ${{ secrets.DEVNET_RPC_ENDPOINT }}
          keypair: ${{ secrets.DEVNET_DEPLOYER_KEYPAIR }}
          buffer-authority: ${{ secrets.DEVNET_MULTISIG_VAULT }}

      - name: Propose Squads upgrade
        uses: solana-foundation/squads-program-action@839c079c881344c2da0365ad6a6bb07892e08e2f # v0.4.3
        with:
          rpc: ${{ secrets.DEVNET_RPC_ENDPOINT }}
          program: ${{ env.DISTRIBUTOR_PROGRAM_ID }}
          multisig: ${{ secrets.DEVNET_MULTISIG }}
          vault-index: "0"
          buffer: ${{ steps.buffer-deploy.outputs.buffer }}
          idl-buffer: ${{ steps.buffer-deploy.outputs.idl-buffer }}
          keypair: ${{ secrets.DEVNET_DEPLOYER_KEYPAIR }}
